# defines all the network related options.
network:
  # bindIP is ip where server working on.
  bindIP:
  # httpPort is port where server listen to http port.
  httpPort: 8080
  # defines tls related options.
  tls:
    # server should be accessed without verifying the TLS certificate.
    insecureSkipVerify:
    # server requires TLS client certificate authentication.
    certFile:
    # server requires TLS client certificate authentication.
    keyFile:
    # trusted root certificates for server.
    caFile:
    # the password to decrypt the certificate.
    password:

# CORS 允许的 Origin 白名单，填写前端页面的访问域名（即 ui 服务的 web.host），
# 不在白名单内的 Origin 不允许跨域携带凭据。
# corsAllowedOrigins:
#   - http://bscp.example.com

# baseConf 为 bscp 自身在蓝鲸 PaaS 上的应用身份(对应 cc.G().BaseConf)。
# 上传类接口(/content/upload、/content/multipart/*)支持用 app 凭证绕开网关直连：
# 第三方携带请求头 X-Bkapi-Authorization: {"bk_app_code":"..","bk_app_secret":".."}，
# 与下面 app_code/app_secret 一致即放行(常量时间比较)。
# 留空则该直连认证不启用，上传接口仍走 Cookie/JWT。
# 注意：下载接口(/content/download)含 IAM 用户级鉴权，未放开 app 凭证直连，仍走 Cookie/JWT。
# 安全须知：该凭证即 bscp 自身身份，外发给第三方存在泄露放大风险，需评估；仅经 HTTPS 暴露。
# 多租户模式下第三方直连仍须带 X-Bk-Tenant-Id 请求头。
# baseConf:
#   app_code: ""
#   app_secret: ""

# defines all the repo related settings.
repository:
  # defines storage type s3 , bkRepo
  storageType: bkRepo
  s3:
    endpoint: http://127.0.0.1:2379
    accessKeyID: xxxxx
    secretAccessKey: xxxxx
    useSSL: true
    bucketName: xxxxx
  bkRepo:
    # endpoints is a list of URLs, format: scheme://addr. e.g: http://127.0.0.1.
    endpoints:
      - http://127.0.0.1:2379
    # token plat authority authentication of repo.
    token: xxxxx
    # project bscp project name in repo.
    project: bk_bscp
    # user bscp project admin user in repo.
    user: admin
    # defines tls related options.
    tls:
      # server should be accessed without verifying the TLS certificate.
      insecureSkipVerify:
      # server requires TLS client certificate authentication.
      certFile:
      # server requires TLS client certificate authentication.
      keyFile:
      # trusted root certificates for server.
      caFile:
      # the password to decrypt the certificate.
      password:

# 特性配置
featureFlags:
  # 业务展示白名单
  BIZ_VIEW:
    # 全局默认配置(优先级低于业务级配置)，默认为true（展示）
    default:
    # 业务级配置，默认为空
    spec:
      "2":
  # 业务资源限制
  RESOURCE_LIMIT:
    # 全局默认配置(优先级低于业务级配置)
    default:
      # 配置文件大小上限，单位为MB，默认为100MB
      maxFileSize:
      # 单个app下允许创建的配置数（模版+非模版），默认为2000
      appConfigCnt:
      # 单个模版套餐下允许创建的模版数，默认为2000
      tmplSetTmplCnt:
    # 业务级配置，默认为空
    spec:
      "2":
        # 配置文件大小上限，单位为MB
        maxFileSize:
        # 单个app下允许创建的配置数（模版+非模版）
        appConfigCnt:
        # 单个模版套餐下允许创建的模版数
        tmplSetTmplCnt:

# defines service related settings.
service:
  # defines etcd related settings
  etcd:
    # endpoints is a list of URLs.
    endpoints:
      - 127.0.0.1:2379
    # dialTimeoutMS is the timeout milliseconds for failing to establish a connection.
    dialTimeoutMS:
    # username is a user's name for authentication.
    username:
    # password is a password for authentication.
    password:
    # defines tls related options.
    tls:
      # server should be accessed without verifying the TLS certificate.
      insecureSkipVerify:
      # server requires TLS client certificate authentication.
      certFile:
      # server requires TLS client certificate authentication.
      keyFile:
      # trusted root certificates for server.
      caFile:
      # the password to decrypt the certificate.
      password:

# defines log's related configuration
log:
  # log storage directory.
  logDir: ./log
  # per file max size, uint: MB.
  maxPerFileSizeMB: 1024
  # per line max size, uint: KB.
  maxPerLineSizeKB: 2
  # log file max storage number.
  maxFileNum: 5
  # whether the restart service log is appended to the latest log file, or whether a new log file is created.
  logAppend: false
  # log the log to std err only, it can not be used with AlsoToStdErr at the same time.
  toStdErr: false
  # log the log to file and also to std err. it can not be used with ToStdErr at the same time.
  alsoToStdErr: false
  # log level.
  verbosity: 0
