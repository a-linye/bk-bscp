name: lint
on: [push, pull_request]
jobs:
  golang-lint:
    name: golang-lint
    runs-on: ubuntu-latest
    steps:
      # 拉取代码
      - name: checkout
        uses: actions/checkout@v4

      # 设置 Go 环境
      - name: setup go
        uses: actions/setup-go@v3
        with:
          go-version-file: go.mod

      # 检查 Go 模块依赖是否整理
      - name: go mod tidy check
        uses: katexochen/go-tidy-check@v2
        with:
          modules: .

      # 运行代码风格检查 (golangci-lint)
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.8.0
          args: --timeout=5m
          working-directory: .

  generated-files-check:
    name: generated-files-check
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v3
        with:
          go-version-file: go.mod

      - name: install generation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: regenerate pb and proto docs
        run: |
          export PATH="${{ github.workspace }}/bin/proto:$(go env GOPATH)/bin:$PATH"
          make init
          make pb api_docs bkapigw_docs normalize_proto_docs

      - name: verify generated files are up to date
        run: |
          if ! git diff --exit-code; then
            echo "Generated proto files are out of date. Please run 'make pb api_docs bkapigw_docs normalize_proto_docs' and commit the changes."
            exit 1
          fi
