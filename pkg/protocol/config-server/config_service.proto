// ManageConfigKVReq йҖҡз”Ё configs иЎЁз®ЎзҗҶиҜ·жұӮ
message ManageConfigKVReq {
  // action ж“ҚдҪңзұ»еһӢ: "upsert", "delete", "get", "list", "append", "remove"
  //   upsert  вҖ” ж•ҙдҪ“еҶҷе…Ҙ KVпјҲиҰҶзӣ–пјүпјҢkvs еҝ…еЎ«
  //   delete  вҖ” еҲ йҷӨжҢҮе®ҡ keyпјҢkey еҝ…еЎ«
  //   get     вҖ” зІҫзЎ®иҺ·еҸ–еҚ•жқЎпјҢkey еҝ…еЎ«
  //   list    вҖ” жҢүеүҚзјҖжү№йҮҸжҹҘиҜўпјҢkey_prefix еҝ…еЎ«
  //   append  вҖ” еҗ‘йҖ—еҸ·еҲҶйҡ”еҲ—иЎЁиҝҪеҠ е…ғзҙ пјҲиҮӘеҠЁеҺ»йҮҚпјүпјҢkvs еҝ…еЎ«
  //   remove  вҖ” д»ҺйҖ—еҸ·еҲҶйҡ”еҲ—иЎЁз§»йҷӨе…ғзҙ пјҢkvs еҝ…еЎ«
  string action = 1;
  // kvs з”ЁдәҺ upsert / append / remove ж“ҚдҪң
  repeated ConfigKVItem kvs = 2;
  // key з”ЁдәҺ delete / get
  string key = 3;
  // key_prefix з”ЁдәҺ list жҢүеүҚзјҖжҹҘиҜў
  string key_prefix = 4;
}

// ConfigKVItem configs иЎЁзҡ„ KV жқЎзӣ®
message ConfigKVItem {
  string key = 1;
  string value = 2;
}

// ManageConfigKVResp йҖҡз”Ё configs иЎЁз®ЎзҗҶе“Қеә”
message ManageConfigKVResp {
  repeated ConfigKVItem items = 1;
}