syntax = "proto3";

import "pkg/protocol/core/base/base.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

package pbproject;

option go_package = "github.com/TencentBlueKing/bk-bscp/pkg/protocol/core/project;pbproject";

// Project source resource reference: pkg/dal/table/project.go
message Project {
  uint32 id = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = { description: "服务ID" }];
  ProjectSpec spec = 2;
  ProjectAttachment attachment = 3;
  pbbase.Revision revision = 4;
}

// ProjectSpec source resource reference: pkg/dal/table/project.go
message ProjectSpec {
  string name = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = { description: "项目名称" }];
  string key = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = { description: "项目标识" }];
  string memo = 3 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = { description: "项目描述" }];
  bool protected = 4 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = { description: "是否保护: true-保护, false-不保护" }
  ];
}

// ProjectAttachment source resource reference: pkg/dal/table/project.go
message ProjectAttachment {
  string tenant_id = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = { description: "租户ID" }];
  uint32 biz_id = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = { description: "业务ID" }];
}
