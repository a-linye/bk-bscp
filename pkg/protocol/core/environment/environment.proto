syntax = "proto3";

import "pkg/protocol/core/base/base.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

package pbenvironment;

option go_package = "github.com/TencentBlueKing/bk-bscp/pkg/protocol/core/environment;pbenvironment";

// Environment source resource reference: pkg/dal/table/environment.go
message Environment {
  uint32 id = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = { description: "环境ID" }];
  EnvironmentSpec spec = 2;
  EnvironmentAttachment attachment = 3;
  pbbase.Revision revision = 4;
}

// EnvironmentSpec source resource reference: pkg/dal/table/environment.go
message EnvironmentSpec {
  string name = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = { description: "环境名称" }];
  string type = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = { description: "环境类型" }];
  string memo = 3 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = { description: "环境描述" }];
  bool protected = 4 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = { description: "是否保护: true-保护, false-不保护" }
  ];
  uint32 display_order = 5 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = { description: "环境排序" }];
}

// EnvironmentAttachment source resource reference: pkg/dal/table/environment.go
message EnvironmentAttachment {
  string tenant_id = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = { description: "租户ID" }];
  uint32 biz_id = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = { description: "业务ID" }];
  uint32 project_id = 3 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = { description: "项目ID" }];
}
